    <rect x="0" y="0" width="24.3" height="24.36" rx="5" fill="#C2C8CC"/>
    <path d="M12.15 8L12.15 16.36M8 12.18L16.3 12.18" stroke="#17494D" stroke-width="2" stroke-linecap="round"/>
    <!-- Message bubble -->
    <rect x="31.46" y="1.1" width="81.49" height="31.38" rx="5" fill="#D6EEF1"/>
  </g>

  <!-- Type Box (bottom) -->
  <rect y="178.41" width="138" height="32.28" rx="3" fill="#F6F5F4"/>
  <rect x="10" y="188" width="80" height="12" rx="2" fill="#E0E0E0" opacity="0.5"/>
