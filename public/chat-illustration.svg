<svg width="138" height="211" viewBox="0 0 138 211" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="138" height="211" rx="5" fill="white"/>

  <!-- Chat Nav (top bar) -->
  <rect width="138" height="31.38" rx="3" fill="#17494D"/>
  <rect x="12.54" y="15.19" width="57.52" height="3.59" rx="1.79" fill="white" opacity="0.8"/>

  <!-- First Message (from user - right side) -->
  <g transform="translate(0, 49.7)">
    <!-- Avatar -->
    <circle cx="118.91" cy="12.15" r="12.15" fill="#FED6A8"/>
    <!-- Message bubble -->
    <rect x="31.46" y="0.51" width="77.91" height="40.35" rx="5" fill="#E8E5F4"/>
  </g>

  <!-- Second Message (from bot - left side) -->
  <g transform="translate(0, 107.13)">
